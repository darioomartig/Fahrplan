<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fahrplan Liebefeld ↔ Bern</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f9fa;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ── Header ──────────────────────────────── */
    header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-inner {
      max-width: 520px;
      margin: 0 auto;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .brand-logo {
      height: 32px;
      width: auto;
      object-fit: contain;
      flex-shrink: 0;
    }
    .brand-icon {
      font-size: 26px;
      line-height: 1;
      flex-shrink: 0;
    }
    .brand-text h1 {
      font-size: 15px;
      font-weight: 700;
      color: #111;
      line-height: 1.1;
    }
    .brand-text p {
      font-size: 11px;
      color: #6b7280;
      margin-top: 1px;
    }
    .header-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .last-update {
      font-size: 11px;
      color: #9ca3af;
    }
    .loading-dot {
      width: 6px;
      height: 6px;
      background: #3b82f6;
      border-radius: 50%;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .btn-refresh {
      background: none;
      border: none;
      cursor: pointer;
      color: #9ca3af;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: color .15s;
    }
    .btn-refresh:hover { color: #3b82f6; }
    .btn-refresh svg { width: 16px; height: 16px; }

    /* ── Tabs ────────────────────────────────── */
    .tabs {
      max-width: 520px;
      margin: 0 auto;
      display: flex;
      border-bottom: 1px solid #e5e7eb;
      padding: 0 16px;
    }
    .tab {
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      color: #6b7280;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
      white-space: nowrap;
    }
    .tab.active {
      color: #2563eb;
      border-bottom-color: #2563eb;
    }

    /* ── Main ────────────────────────────────── */
    main {
      max-width: 520px;
      margin: 0 auto;
      padding: 14px 14px 32px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Route card ──────────────────────────── */
    .route-card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      overflow: hidden;
    }
    .route-header {
      background: #f9fafb;
      border-bottom: 1px solid #f0f0f0;
      padding: 8px 14px;
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    /* ── Connection rows ─────────────────────── */
    .conn-list {
      divide-y: 1px solid #f3f4f6;
    }
    .conn-row {
      padding: 12px 14px;
      border-bottom: 1px solid #f3f4f6;
    }
    .conn-row:last-child { border-bottom: none; }
    .conn-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .conn-times {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dep-time {
      font-size: 18px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #111;
      letter-spacing: -.3px;
    }
    .delay-badge {
      font-size: 11px;
      font-weight: 600;
      color: #dc2626;
    }
    .arrow {
      color: #d1d5db;
      font-size: 13px;
    }
    .arr-time {
      font-size: 18px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: #6b7280;
      letter-spacing: -.3px;
    }
    .countdown {
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .countdown.now    { color: #dc2626; font-size: 14px; }
    .countdown.soon   { color: #d97706; }
    .countdown.normal { color: #16a34a; }
    .countdown.future { color: #6b7280; font-weight: 500; }

    .conn-meta {
      margin-top: 5px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .line-badge {
      background: #dbeafe;
      color: #1d4ed8;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
    }
    .duration {
      font-size: 12px;
      color: #9ca3af;
    }
    .delay-info {
      font-size: 12px;
      color: #dc2626;
    }

    /* ── Skeleton ────────────────────────────── */
    .skeleton { animation: shimmer 1.2s infinite; }
    @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:.45} }
    .skel-line {
      background: #e5e7eb;
      border-radius: 4px;
      height: 14px;
    }

    /* ── Error ───────────────────────────────── */
    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #b91c1c;
    }

    /* ── Footer ──────────────────────────────── */
    footer {
      text-align: center;
      font-size: 11px;
      color: #d1d5db;
      padding: 8px 16px 24px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <!-- Logo swaps with tab -->
      <img id="brand-logo" class="brand-logo" src="" alt="Kellerhals Carrard" style="display:none">
      <span id="brand-icon" class="brand-icon" style="display:none">🏠</span>
      <div class="brand-text">
        <h1>Fahrplan</h1>
        <p>Liebefeld ↔ Bern</p>
      </div>
    </div>
    <div class="header-meta">
      <div id="loading-dot" class="loading-dot" style="display:none"></div>
      <span id="last-update" class="last-update"></span>
      <button class="btn-refresh" onclick="refresh()" title="Aktualisieren">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-arbeit" onclick="setTab('arbeit')">🏢 Zur Arbeit</button>
    <button class="tab"        id="tab-heim"   onclick="setTab('heim')">🏠 Nach Hause</button>
  </div>
</header>

<main id="main"></main>

<footer>Automatische Aktualisierung alle 60 s · transport.opendata.ch</footer>

<script>
const KC_LOGO = 'https://raw.githubusercontent.com/darioomartig/Kc/main/kc%20lange.jpg';
const API     = 'https://transport.opendata.ch/v1/connections';

const ROUTES = {
  arbeit: [
    { label: 'Liebefeld Park → Monbijou',   from: 'Liebefeld, Liebefeld Park', to: 'Bern, Monbijou' },
    { label: 'Neuhausplatz → Kocherpark',    from: 'Liebefeld, Neuhausplatz',   to: 'Bern, Kocherpark' },
  ],
  heim: [
    { label: 'Hirschengraben → Neuhausplatz', from: 'Bern, Hirschengraben',     to: 'Liebefeld, Neuhausplatz' },
    { label: 'Monbijou → Liebefeld Park',      from: 'Bern, Monbijou',           to: 'Liebefeld, Liebefeld Park' },
  ],
};

let activeTab    = 'arbeit';
let cachedData   = { arbeit: null, heim: null };
let clockTimer   = null;
let refreshTimer = null;

// ── Brand swap ───────────────────────────────────────────────────────────────
function updateBrand(tab) {
  const logo = document.getElementById('brand-logo');
  const icon = document.getElementById('brand-icon');
  if (tab === 'arbeit') {
    logo.src = KC_LOGO;
    logo.style.display = 'block';
    icon.style.display = 'none';
  } else {
    logo.style.display = 'none';
    icon.style.display = 'block';
  }
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function setTab(tab) {
  activeTab = tab;
  document.getElementById('tab-arbeit').classList.toggle('active', tab === 'arbeit');
  document.getElementById('tab-heim').classList.toggle('active', tab === 'heim');
  updateBrand(tab);
  if (cachedData[tab]) {
    render(cachedData[tab]);
  } else {
    renderSkeleton();
    refresh();
  }
}

// ── API ───────────────────────────────────────────────────────────────────────
async function fetchRoute(from, to) {
  const url = `${API}?${new URLSearchParams({ from, to, limit: 4 })}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  return json.connections || [];
}

async function refresh() {
  setLoading(true);
  try {
    const routes  = ROUTES[activeTab];
    const results = await Promise.all(routes.map(r => fetchRoute(r.from, r.to)));
    cachedData[activeTab] = results;
    render(results);
    const now = new Date();
    document.getElementById('last-update').textContent =
      now.toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' });
  } catch (e) {
    document.getElementById('main').innerHTML =
      `<div class="error-box">Verbindungen konnten nicht geladen werden.</div>`;
  } finally {
    setLoading(false);
  }
}

function setLoading(on) {
  document.getElementById('loading-dot').style.display = on ? 'block' : 'none';
}

// ── Time helpers ──────────────────────────────────────────────────────────────
function fmtTime(iso) {
  if (!iso) return '--:--';
  return new Date(iso).toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' });
}

function effectiveDep(conn) {
  return conn.from?.prognosis?.departure || conn.from?.departure;
}

function minutesUntil(iso) {
  if (!iso) return null;
  return Math.round((new Date(iso) - Date.now()) / 60000);
}

function countdownHtml(conn) {
  const min = minutesUntil(effectiveDep(conn));
  if (min === null) return '';
  if (min <= 0)  return `<span class="countdown now">Jetzt</span>`;
  if (min <= 2)  return `<span class="countdown now">in ${min} min</span>`;
  if (min <= 6)  return `<span class="countdown soon">in ${min} min</span>`;
  if (min <= 15) return `<span class="countdown normal">in ${min} min</span>`;
  return `<span class="countdown future">in ${min} min</span>`;
}

function parseDuration(dur) {
  if (!dur) return '';
  const m = dur.match(/(\d+)d(\d+):(\d+):/);
  if (!m) return dur;
  const total = +m[1] * 1440 + +m[2] * 60 + +m[3];
  if (total < 60) return `${total} min`;
  const h = Math.floor(total / 60), r = total % 60;
  return r ? `${h} h ${r} min` : `${h} h`;
}

function delayMin(conn) {
  const d = conn.from?.delay;
  if (!d) return 0;
  return d >= 60 ? Math.round(d / 60) : d;
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderSkeleton() {
  const routes = ROUTES[activeTab];
  document.getElementById('main').innerHTML = routes.map(r => `
    <div class="route-card">
      <div class="route-header">${r.label}</div>
      ${[0,0,0,0].map(() => `
        <div class="conn-row skeleton">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div class="skel-line" style="width:120px"></div>
            <div class="skel-line" style="width:60px"></div>
          </div>
          <div class="skel-line" style="width:80px;margin-top:8px;height:10px"></div>
        </div>`).join('')}
    </div>`).join('');
}

function render(data) {
  const routes = ROUTES[activeTab];
  document.getElementById('main').innerHTML = routes.map((r, i) => {
    const conns = data[i] || [];
    const rows = conns.length
      ? conns.map(conn => {
          const delay   = delayMin(conn);
          const depIso  = conn.from?.departure;
          const arrIso  = conn.to?.arrival;
          const line    = (conn.products || [])[0] || '';
          const dur     = parseDuration(conn.duration);
          const depStr  = fmtTime(depIso);
          const arrStr  = fmtTime(arrIso);
          const delayBadge  = delay > 0 ? `<span class="delay-badge">+${delay}'</span>` : '';
          const delayInfo   = delay > 0 ? `<span class="delay-info">${delay} min Verspätung</span>` : '';
          const lineBadge   = line ? `<span class="line-badge">${line}</span>` : '';
          return `
            <div class="conn-row">
              <div class="conn-top">
                <div class="conn-times">
                  <span class="dep-time">${depStr}</span>${delayBadge}
                  <span class="arrow">→</span>
                  <span class="arr-time">${arrStr}</span>
                </div>
                ${countdownHtml(conn)}
              </div>
              <div class="conn-meta">
                ${lineBadge}
                <span class="duration">${dur}</span>
                ${delayInfo}
              </div>
            </div>`;
        }).join('')
      : `<div class="conn-row" style="color:#9ca3af;font-size:13px;text-align:center">Keine Verbindungen gefunden</div>`;

    return `
      <div class="route-card">
        <div class="route-header">${r.label}</div>
        ${rows}
      </div>`;
  }).join('');
}

// ── Clock tick (keeps countdowns live) ───────────────────────────────────────
function tick() {
  if (cachedData[activeTab]) render(cachedData[activeTab]);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
updateBrand('arbeit');
renderSkeleton();
refresh();
clockTimer   = setInterval(tick,    1_000);
refreshTimer = setInterval(refresh, 60_000);
</script>
</body>
</html>
