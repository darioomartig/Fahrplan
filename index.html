<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fahrplan</title>
  <style>
    :root {
      --bg:      #f5f5f5;
      --surface: #ffffff;
      --text:    #0a0a0a;
      --sub:     #6b6b6b;
      --faint:   #e8e8e8;
      --accent:  #0051a2;
      --red:     #c8000a;
      --amber:   #b45309;
      --green:   #166534;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--faint);
      flex-shrink: 0;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px 12px;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    #brand-logo {
      height: 44px;
      width: auto;
      object-fit: contain;
      display: none;
    }

    #brand-icon {
      font-size: 28px;
      line-height: 1;
      display: none;
    }

    .brand-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--sub);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    #last-update {
      font-size: 12px;
      color: var(--sub);
      font-variant-numeric: tabular-nums;
    }

    #loading-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      display: none;
      animation: blink 1s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    .btn-refresh {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--sub);
      padding: 6px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      transition: color .15s, background .15s;
    }

    .btn-refresh:hover {
      color: var(--accent);
      background: #f0f4ff;
    }

    .btn-refresh svg { width: 15px; height: 15px; }

    /* ── Tabs ───────────────────────────────────────────────────────── */
    .tab-bar {
      display: flex;
      padding: 0 24px;
      gap: 0;
    }

    .tab {
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--sub);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      cursor: pointer;
      letter-spacing: .01em;
      transition: color .15s, border-color .15s;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Main grid ──────────────────────────────────────────────────── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--faint);
      overflow: hidden;
    }

    /* mobile: stack */
    @media (max-width: 600px) {
      main {
        grid-template-columns: 1fr;
        overflow-y: auto;
        background: var(--bg);
        gap: 12px;
        padding: 12px;
      }
    }

    /* ── Route panel ────────────────────────────────────────────────── */
    .route-panel {
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    @media (max-width: 600px) {
      .route-panel {
        border-radius: 12px;
        border: 1px solid var(--faint);
      }
    }

    .route-title {
      padding: 18px 28px 12px;
      border-bottom: 1px solid var(--faint);
    }

    .route-from {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: .01em;
    }

    .route-to {
      font-size: 13px;
      color: var(--sub);
      margin-top: 2px;
    }

    .route-to::before {
      content: '→  ';
      color: var(--faint);
      font-size: 11px;
    }

    /* ── Connection rows ────────────────────────────────────────────── */
    .conn-list {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .conn-row {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 28px;
      border-bottom: 1px solid var(--faint);
      min-height: 0;
    }

    .conn-row:last-child { border-bottom: none; }

    .conn-main {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }

    .times {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .dep {
      font-size: 26px;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
      letter-spacing: -.5px;
      color: var(--text);
      line-height: 1;
    }

    .dep.delayed {
      text-decoration: line-through;
      color: var(--sub);
      font-size: 20px;
    }

    .dep-actual {
      font-size: 26px;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
      letter-spacing: -.5px;
      color: var(--red);
      line-height: 1;
    }

    .sep {
      font-size: 14px;
      color: var(--faint);
      font-weight: 300;
    }

    .arr {
      font-size: 20px;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
      letter-spacing: -.3px;
      color: var(--sub);
      line-height: 1;
    }

    .countdown {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .01em;
      flex-shrink: 0;
      line-height: 1;
    }

    .countdown.now    { color: var(--red); font-size: 15px; }
    .countdown.soon   { color: var(--amber); }
    .countdown.normal { color: var(--green); }
    .countdown.future { color: var(--sub); font-weight: 400; }

    .conn-sub {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 6px;
    }

    .line-pill {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .04em;
      background: #e8f0fd;
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 20px;
    }

    .dur {
      font-size: 12px;
      color: var(--sub);
    }

    .delay-tag {
      font-size: 12px;
      color: var(--red);
    }

    /* ── Skeleton ───────────────────────────────────────────────────── */
    .skel {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: sweep 1.4s infinite;
      border-radius: 4px;
      height: 24px;
    }

    @keyframes sweep {
      0%   { background-position: 200% 0 }
      100% { background-position: -200% 0 }
    }

    .skel-sm { height: 12px; margin-top: 8px; width: 80px; }

    /* ── Error ──────────────────────────────────────────────────────── */
    .error-msg {
      padding: 28px;
      font-size: 13px;
      color: var(--red);
    }
  </style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="brand">
      <img id="brand-logo" alt="Kellerhals Carrard"
           src="https://raw.githubusercontent.com/darioomartig/Kc/main/kc%20lange.jpg">
      <span id="brand-icon">🏠</span>
      <span class="brand-label">Fahrplan</span>
    </div>
    <div class="header-right">
      <div id="loading-dot"></div>
      <span id="last-update"></span>
      <button class="btn-refresh" onclick="doRefresh()" title="Aktualisieren">
        <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9
               m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab active" id="tab-arbeit" onclick="setTab('arbeit')">Zur Arbeit</button>
    <button class="tab"        id="tab-heim"   onclick="setTab('heim')">Nach Hause</button>
  </div>
</header>

<main id="main"></main>

<script>
const API = 'https://transport.opendata.ch/v1/connections';
const KC  = 'https://raw.githubusercontent.com/darioomartig/Kc/main/kc%20lange.jpg';

const ROUTES = {
  arbeit: [
    { from: 'Liebefeld, Liebefeld Park', to: 'Bern, Monbijou' },
    { from: 'Liebefeld, Neuhausplatz',   to: 'Bern, Kocherpark' },
  ],
  heim: [
    { from: 'Bern, Hirschengraben',     to: 'Liebefeld, Neuhausplatz' },
    { from: 'Bern, Monbijou',           to: 'Liebefeld, Liebefeld Park' },
  ],
};

let tab    = 'arbeit';
let cache  = { arbeit: null, heim: null };
let nowMs  = Date.now();

// ── Brand ──────────────────────────────────────────────────────────────────
function applyBrand(t) {
  const logo = document.getElementById('brand-logo');
  const icon = document.getElementById('brand-icon');
  if (t === 'arbeit') {
    logo.style.display = 'block';
    icon.style.display = 'none';
  } else {
    logo.style.display = 'none';
    icon.style.display = 'block';
  }
}

// ── Tab ────────────────────────────────────────────────────────────────────
function setTab(t) {
  tab = t;
  document.getElementById('tab-arbeit').classList.toggle('active', t === 'arbeit');
  document.getElementById('tab-heim').classList.toggle('active', t === 'heim');
  applyBrand(t);
  cache[t] ? render(cache[t]) : (skeleton(), doRefresh());
}

// ── Fetch ──────────────────────────────────────────────────────────────────
async function fetchRoute(from, to) {
  const r = await fetch(`${API}?${new URLSearchParams({ from, to, limit: 4 })}`);
  if (!r.ok) throw new Error(r.status);
  return (await r.json()).connections || [];
}

async function doRefresh() {
  loading(true);
  try {
    cache[tab] = await Promise.all(ROUTES[tab].map(r => fetchRoute(r.from, r.to)));
    render(cache[tab]);
    document.getElementById('last-update').textContent =
      new Date().toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' });
  } catch {
    document.getElementById('main').innerHTML =
      ROUTES[tab].map(() =>
        `<div class="route-panel"><div class="error-msg">Fehler beim Laden.</div></div>`
      ).join('');
  }
  loading(false);
}

function loading(on) {
  document.getElementById('loading-dot').style.display = on ? 'block' : 'none';
}

// ── Time helpers ───────────────────────────────────────────────────────────
const fmt = iso => iso
  ? new Date(iso).toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' })
  : '--:--';

const effDep = c => c.from?.prognosis?.departure || c.from?.departure;

function minsUntil(iso) {
  return iso ? Math.round((new Date(iso) - nowMs) / 60000) : null;
}

function countdownHtml(c) {
  const m = minsUntil(effDep(c));
  if (m === null) return '';
  if (m <= 0)  return `<span class="countdown now">Jetzt</span>`;
  if (m <= 2)  return `<span class="countdown now">in ${m}&thinsp;min</span>`;
  if (m <= 7)  return `<span class="countdown soon">in ${m}&thinsp;min</span>`;
  if (m <= 20) return `<span class="countdown normal">in ${m}&thinsp;min</span>`;
  return `<span class="countdown future">in ${m}&thinsp;min</span>`;
}

function parseDur(d) {
  if (!d) return '';
  const m = d.match(/(\d+)d(\d+):(\d+):/);
  if (!m) return d;
  const tot = +m[1]*1440 + +m[2]*60 + +m[3];
  return tot < 60 ? `${tot} min` : `${Math.floor(tot/60)} h ${tot%60 ? tot%60+' min' : ''}`;
}

function delayMin(c) {
  const d = c.from?.delay;
  return d ? (d >= 60 ? Math.round(d/60) : d) : 0;
}

// ── Render ─────────────────────────────────────────────────────────────────
function routeLabel(r) {
  const short = s => s.replace('Liebefeld, ', '').replace('Bern, ', '');
  return { from: short(r.from), to: short(r.to) };
}

function connHtml(c) {
  const delay    = delayMin(c);
  const depSched = fmt(c.from?.departure);
  const depReal  = delay > 0 ? fmt(effDep(c)) : null;
  const arr      = fmt(c.to?.arrival);
  const line     = (c.products || [])[0] || '';
  const dur      = parseDur(c.duration);

  const depHtml = depReal
    ? `<span class="dep delayed">${depSched}</span>
       <span class="dep-actual">${depReal}</span>`
    : `<span class="dep">${depSched}</span>`;

  return `
    <div class="conn-row">
      <div class="conn-main">
        <div class="times">
          ${depHtml}
          <span class="sep">→</span>
          <span class="arr">${arr}</span>
        </div>
        ${countdownHtml(c)}
      </div>
      <div class="conn-sub">
        ${line ? `<span class="line-pill">${line}</span>` : ''}
        <span class="dur">${dur}</span>
        ${delay > 0 ? `<span class="delay-tag">+${delay} min</span>` : ''}
      </div>
    </div>`;
}

function render(data) {
  document.getElementById('main').innerHTML = ROUTES[tab].map((r, i) => {
    const lbl  = routeLabel(r);
    const rows = (data[i] || []).map(connHtml).join('') ||
      `<div class="conn-row"><span style="color:var(--sub);font-size:13px">Keine Verbindungen</span></div>`;
    return `
      <div class="route-panel">
        <div class="route-title">
          <div class="route-from">${lbl.from}</div>
          <div class="route-to">${lbl.to}</div>
        </div>
        <div class="conn-list">${rows}</div>
      </div>`;
  }).join('');
}

function skeleton() {
  document.getElementById('main').innerHTML = ROUTES[tab].map((r) => {
    const lbl = routeLabel(r);
    return `
      <div class="route-panel">
        <div class="route-title">
          <div class="route-from">${lbl.from}</div>
          <div class="route-to">${lbl.to}</div>
        </div>
        <div class="conn-list">
          ${[0,0,0,0].map(() => `
            <div class="conn-row">
              <div class="skel" style="width:180px"></div>
              <div class="skel skel-sm"></div>
            </div>`).join('')}
        </div>
      </div>`;
  }).join('');
}

// ── Clock ──────────────────────────────────────────────────────────────────
setInterval(() => {
  nowMs = Date.now();
  if (cache[tab]) render(cache[tab]);
}, 1000);

setInterval(doRefresh, 60_000);

// ── Boot ───────────────────────────────────────────────────────────────────
applyBrand('arbeit');
skeleton();
doRefresh();
</script>
</body>
</html>
