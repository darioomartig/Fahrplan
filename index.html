<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fahrplan</title>
  <style>
    :root {
      --bg:      #e8edf2;
      --surface: #ffffff;
      --text:    #1e293b;
      --sub:     #64748b;
      --faint:   #e2e8f0;
      --accent:  #1d4ed8;
      --red:     #b91c1c;
      --amber:   #92400e;
      --green:   #15803d;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--faint);
      flex-shrink: 0;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      gap: 16px;
    }

    .brand { display: flex; align-items: center; gap: 14px; min-width: 0; }

    #brand-logo {
      height: 44px;
      width: auto;
      object-fit: contain;
      display: none;
    }

    #brand-icon {
      font-size: 32px;
      line-height: 1;
      display: none;
    }

    .brand-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--sub);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #last-update {
      font-size: 12px;
      color: var(--sub);
      font-variant-numeric: tabular-nums;
    }

    #loading-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      display: none;
      animation: blink 1s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

    .btn-refresh {
      background: none; border: none; cursor: pointer;
      color: var(--sub); padding: 6px; border-radius: 8px;
      display: flex; align-items: center;
      transition: color .15s, background .15s;
    }
    .btn-refresh:hover { color: var(--accent); background: #eff6ff; }
    .btn-refresh svg { width: 15px; height: 15px; }

    /* ── Tabs ────────────────────────────────────────────────────── */
    .tab-bar { display: flex; padding: 0 24px; }

    .tab {
      padding: 10px 18px;
      font-size: 13px; font-weight: 500;
      color: var(--sub);
      background: none; border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      cursor: pointer;
      letter-spacing: .01em;
      transition: color .15s, border-color .15s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Main grid ───────────────────────────────────────────────── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 20px;
      align-items: start;
    }

    @media (max-width: 620px) {
      main {
        grid-template-columns: 1fr;
        padding: 14px;
        gap: 14px;
      }
    }

    /* ── Route card ──────────────────────────────────────────────── */
    .route-card {
      background: var(--surface);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    }

    /* ── Route header ────────────────────────────────────────────── */
    .route-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--faint);
    }

    .route-from {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.2px;
      line-height: 1.1;
    }

    .route-arrow {
      display: inline-block;
      color: var(--faint);
      margin: 6px 0 3px;
      font-size: 13px;
    }

    .route-to {
      font-size: 16px;
      font-weight: 500;
      color: var(--sub);
      letter-spacing: -.1px;
    }

    /* ── Connection rows ─────────────────────────────────────────── */
    .conn-row {
      padding: 16px 24px;
      border-bottom: 1px solid var(--faint);
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .conn-row:last-child { border-bottom: none; }

    .conn-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .times {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .dep {
      font-size: 28px;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
      letter-spacing: -.5px;
      color: var(--text);
      line-height: 1;
    }

    .dep.striked {
      font-size: 22px;
      text-decoration: line-through;
      color: var(--sub);
    }

    .dep-new {
      font-size: 28px;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
      letter-spacing: -.5px;
      color: var(--red);
      line-height: 1;
    }

    .sep { font-size: 14px; color: #cbd5e1; }

    .arr {
      font-size: 22px;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
      letter-spacing: -.3px;
      color: var(--sub);
      line-height: 1;
    }

    .countdown {
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
      line-height: 1;
    }
    .countdown.now    { color: var(--red); font-size: 16px; }
    .countdown.soon   { color: var(--amber); }
    .countdown.normal { color: var(--green); }
    .countdown.future { color: var(--sub); font-weight: 400; font-size: 13px; }

    .conn-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .line-pill {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .04em;
      background: #dbeafe;
      color: #1e40af;
      padding: 3px 9px;
      border-radius: 20px;
    }

    .dur {
      font-size: 12px;
      color: var(--sub);
    }

    .delay-tag {
      font-size: 12px;
      font-weight: 600;
      color: var(--red);
    }

    /* ── Skeleton ────────────────────────────────────────────────── */
    .skel {
      border-radius: 6px;
      background: linear-gradient(90deg, #e2e8f0 25%, #cbd5e1 50%, #e2e8f0 75%);
      background-size: 200% 100%;
      animation: sweep 1.5s infinite;
    }
    @keyframes sweep { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Error ───────────────────────────────────────────────────── */
    .error-row {
      padding: 20px 24px;
      font-size: 13px;
      color: var(--red);
    }
  </style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="brand">
      <img id="brand-logo" alt="Kellerhals Carrard"
           src="https://raw.githubusercontent.com/darioomartig/Kc/main/kc%20lange.jpg">
      <span id="brand-icon">🏠</span>
      <span class="brand-label">Fahrplan</span>
    </div>
    <div class="header-right">
      <div id="loading-dot"></div>
      <span id="last-update"></span>
      <button class="btn-refresh" onclick="doRefresh()" title="Aktualisieren">
        <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9
               m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab active" id="tab-arbeit" onclick="setTab('arbeit')">Zur Arbeit</button>
    <button class="tab"        id="tab-heim"   onclick="setTab('heim')">Nach Hause</button>
    <button class="tab"        id="tab-prah"   onclick="setTab('prah')">Zu Prah</button>
  </div>
</header>

<main id="main"></main>

<script>
const API = 'https://transport.opendata.ch/v1/connections';

const ROUTES = {
  arbeit: [
    { from: 'Liebefeld, Liebefeld Park', to: 'Bern, Monbijou' },
    { from: 'Liebefeld, Neuhausplatz',   to: 'Bern, Kocherpark' },
  ],
  heim: [
    { from: 'Bern, Hirschengraben',  to: 'Liebefeld, Neuhausplatz' },
    { from: 'Bern, Monbijou',        to: 'Liebefeld, Liebefeld Park' },
  ],
  prah: [
    { from: 'Liebefeld, Neuhausplatz',   to: 'Bern, Engeried' },
    { from: 'Liebefeld, Liebefeld Park', to: 'Bern, Engeried' },
  ],
};

let tab   = 'arbeit';
let cache = { arbeit: null, heim: null, prah: null };
let nowMs = Date.now();

function applyBrand(t) {
  const logo = document.getElementById('brand-logo');
  const icon = document.getElementById('brand-icon');
  logo.style.display = t === 'arbeit' ? 'block' : 'none';
  icon.style.display = t !== 'arbeit' ? 'block' : 'none';
  document.getElementById('brand-icon').textContent = t === 'heim' ? '🏠' : '🚶';
}

function setTab(t) {
  tab = t;
  ['arbeit','heim','prah'].forEach(id =>
    document.getElementById('tab-'+id).classList.toggle('active', t === id)
  );
  applyBrand(t);
  cache[t] ? render(cache[t]) : (skeleton(), doRefresh());
}

async function fetchRoute(from, to) {
  const r = await fetch(`${API}?${new URLSearchParams({ from, to, limit: 4 })}`);
  if (!r.ok) throw new Error(r.status);
  return (await r.json()).connections || [];
}

async function doRefresh() {
  loading(true);
  try {
    cache[tab] = await Promise.all(ROUTES[tab].map(r => fetchRoute(r.from, r.to)));
    render(cache[tab]);
    document.getElementById('last-update').textContent =
      new Date().toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' });
  } catch {
    document.getElementById('main').innerHTML =
      ROUTES[tab].map(() =>
        `<div class="route-card"><div class="error-row">Fehler beim Laden.</div></div>`
      ).join('');
  }
  loading(false);
}

function loading(on) {
  document.getElementById('loading-dot').style.display = on ? 'block' : 'none';
}

const fmt = iso => iso
  ? new Date(iso).toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' })
  : '--:--';

const effDep = c => c.from?.prognosis?.departure || c.from?.departure;

function minsUntil(iso) {
  return iso ? Math.round((new Date(iso) - nowMs) / 60000) : null;
}

function countdownHtml(c) {
  const m = minsUntil(effDep(c));
  if (m === null) return '';
  if (m <= 0)  return `<span class="countdown now">Jetzt</span>`;
  if (m <= 2)  return `<span class="countdown now">in ${m}&thinsp;min</span>`;
  if (m <= 7)  return `<span class="countdown soon">in ${m}&thinsp;min</span>`;
  if (m <= 20) return `<span class="countdown normal">in ${m}&thinsp;min</span>`;
  return `<span class="countdown future">in ${m}&thinsp;min</span>`;
}

function parseDur(d) {
  if (!d) return '';
  const m = d.match(/(\d+)d(\d+):(\d+):/);
  if (!m) return d;
  const tot = +m[1]*1440 + +m[2]*60 + +m[3];
  return tot < 60 ? `${tot} min` : `${Math.floor(tot/60)}h ${tot%60 ? tot%60+' min' : ''}`;
}

function delayMin(c) {
  const d = c.from?.delay;
  return d ? (d >= 60 ? Math.round(d/60) : d) : 0;
}

const shortName = s => s.replace('Liebefeld, ', '').replace('Bern, ', '');

function connHtml(c) {
  const delay   = delayMin(c);
  const dep     = fmt(c.from?.departure);
  const depReal = delay > 0 ? fmt(effDep(c)) : null;
  const arr     = fmt(c.to?.arrival);
  const line    = (c.products || [])[0] || '';
  const dur     = parseDur(c.duration);

  const depPart = depReal
    ? `<span class="dep striked">${dep}</span><span class="dep-new">${depReal}</span>`
    : `<span class="dep">${dep}</span>`;

  return `
    <div class="conn-row">
      <div class="conn-top">
        <div class="times">
          ${depPart}
          <span class="sep">→</span>
          <span class="arr">${arr}</span>
        </div>
        ${countdownHtml(c)}
      </div>
      <div class="conn-meta">
        ${line ? `<span class="line-pill">${line}</span>` : ''}
        <span class="dur">${dur}</span>
        ${delay > 0 ? `<span class="delay-tag">+${delay} min</span>` : ''}
      </div>
    </div>`;
}

function render(data) {
  document.getElementById('main').innerHTML = ROUTES[tab].map((r, i) => {
    const from = shortName(r.from);
    const to   = shortName(r.to);
    const rows = (data[i] || []).map(connHtml).join('') ||
      `<div class="error-row" style="color:var(--sub)">Keine Verbindungen</div>`;
    return `
      <div class="route-card">
        <div class="route-header">
          <div class="route-from">${from}</div>
          <div class="route-arrow">↓</div>
          <div class="route-to">${to}</div>
        </div>
        ${rows}
      </div>`;
  }).join('');
}

function skeleton() {
  document.getElementById('main').innerHTML = ROUTES[tab].map((r) => {
    const rows = [0,0,0,0].map(() => `
      <div class="conn-row">
        <div class="skel" style="width:190px;height:28px"></div>
        <div class="skel" style="width:90px;height:12px;margin-top:4px"></div>
      </div>`).join('');
    return `
      <div class="route-card">
        <div class="route-header">
          <div class="route-from">${shortName(r.from)}</div>
          <div class="route-arrow">↓</div>
          <div class="route-to">${shortName(r.to)}</div>
        </div>
        ${rows}
      </div>`;
  }).join('');
}

setInterval(() => { nowMs = Date.now(); if (cache[tab]) render(cache[tab]); }, 1000);
setInterval(doRefresh, 60_000);

applyBrand('arbeit');
skeleton();
doRefresh();
</script>
</body>
</html>
